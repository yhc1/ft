<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIL Readiness Assessment — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 360px;
    }
    .logo {
      font-size: 13px;
      font-weight: 600;
      color: #1a56a0;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #475569;
      margin-bottom: 6px;
    }
    input {
      display: block;
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #1a56a0; }
    button {
      width: 100%;
      padding: 11px;
      background: #1a56a0;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #154387; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .error {
      margin-top: 14px;
      padding: 10px 12px;
      background: #fef2f2;
      color: #dc2626;
      font-size: 13px;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">AIL Readiness Assessment</div>
    <h1>Sign in</h1>
    <form id="login-form">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required>
      <button type="submit" id="submit-btn">Sign in</button>
      <div class="error" id="error-msg">Invalid username or password.</div>
    </form>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        if (res.ok) {
          const data = await res.json();
          sessionStorage.setItem('ail_username', data.username);
          window.location.replace('/');
        } else {
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      } catch {
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
